name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR/branch (saves minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for the JaCoCo coverage PR comment

jobs:
  # ---------------------------------------------------------------------------
  # Detect WHICH areas changed so we only run the heavy jobs that are relevant.
  # A docs-only change (README, doc/**) leaves both outputs 'false' → the build
  # and test jobs are skipped, and the `ci-ok` gate below still goes green.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend-test:
    name: Backend Tests
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run unit tests
        working-directory: backend
        run: ./mvnw test -Dsurefire.excludedGroups=integration

      - name: Run integration tests
        working-directory: backend
        run: ./mvnw test -Dsurefire.excludedGroups=

      # JaCoCo report is generated by the maven plugin (bound to the test phase).
      # The steps below only publish it — they never fail the build.
      - name: Publish coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

  frontend-build:
    name: Frontend Build
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # `npm ci` is strict; the committed lock omits Linux-only optional deps
        # (e.g. @emnapi/*) because it was last resolved on Windows. Fall back to
        # `npm install` on Linux — same pragmatic approach as frontend/Dockerfile.
        run: npm ci || npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npx ng build

  frontend-e2e:
    name: Frontend E2E Tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # `npm ci` is strict; the committed lock omits Linux-only optional deps
        # (e.g. @emnapi/*) because it was last resolved on Windows. Fall back to
        # `npm install` on Linux — same pragmatic approach as frontend/Dockerfile.
        run: npm ci || npm install --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # The SINGLE required status check for branch protection.
  # It waits for every area job and is green when none FAILED — skipped jobs
  # (docs-only change) are acceptable. This avoids the classic "skipped but
  # required" trap where a path-filtered required check leaves the PR stuck on
  # "Expected — Waiting for status to be reported" forever.
  # ---------------------------------------------------------------------------
  ci-ok:
    name: CI OK
    if: always()
    needs: [changes, backend-test, frontend-build, frontend-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::A required CI job failed or was cancelled."
          exit 1
      - name: Success
        run: echo "CI passed. (Skipped jobs from path filtering are acceptable.)"
