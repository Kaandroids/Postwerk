spring:
  application:
    name: postwerk

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postwerk}
    username: ${SPRING_DATASOURCE_USERNAME:postwerk}
    password: ${SPRING_DATASOURCE_PASSWORD:postwerk}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  # System/transactional email (verification, password reset). Only used when app.mail.enabled=true;
  # otherwise a logging fallback is wired so tests and no-mail dev still start. Mailpit in dev,
  # Resend (smtp.resend.com) in prod — both are plain SMTP, only env differs.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  chat-model: ${GEMINI_CHAT_MODEL:gemini-2.5-pro}
  chat-temperature: ${GEMINI_CHAT_TEMPERATURE:0.4}
  chat-max-tokens: ${GEMINI_CHAT_MAX_TOKENS:8192}
  embedding-model: gemini-embedding-001
  pricing:
    usd-to-eur: 0.92
    models:
      gemini-2.5-flash:
        input-per-million: 0.15
        output-per-million: 0.60
      gemini-2.5-pro:
        input-per-million: 1.25
        output-per-million: 10.00
      gemini-embedding-001:
        input-per-million: 0.006
        output-per-million: 0.0

# Circuit breaker (Resilience4j)
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      gemini:
        base-config: default
        wait-duration-in-open-state: 60s
      smtp:
        base-config: default
        wait-duration-in-open-state: 30s
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
    instances:
      gemini:
        base-config: default
        max-attempts: 3
      imap:
        base-config: default
        max-attempts: 2

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

spring.lifecycle:
  timeout-per-shutdown-phase: 30s

# Actuator & Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
    prometheus:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    mail:
      enabled: false

info:
  app:
    name: Postwerk
    description: SaaS Email Automation Platform
    version: 1.0.0

springdoc:
  # OFF by default (base + prod). Opt-in for local development only via the 'dev' profile.
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    enabled: false
    path: /v3/api-docs

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  # Base URL of the Angular frontend — used to build clickable email links (verify, reset).
  # In prod the frontend and API share the domain (Caddy path-routes); in dev the SPA is on :4200.
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:4200}
  mail:
    # When false (default), email is logged instead of sent (tests / no-mail dev). Set true in
    # any environment that has spring.mail.* configured (Mailpit dev, Resend prod).
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@postwerk.io}
    from-name: ${MAIL_FROM_NAME:Postwerk}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  encryption:
    key: ${ENCRYPTION_KEY}
  sync:
    interval-ms: ${APP_SYNC_INTERVAL_MS:300000}
    initial-delay-ms: ${APP_SYNC_INITIAL_DELAY_MS:60000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}
  gdpr:
    email-retention-days: ${GDPR_EMAIL_RETENTION_DAYS:365}
    audit-log-retention-days: ${GDPR_AUDIT_LOG_RETENTION_DAYS:730}
    account-deletion-grace-days: ${GDPR_ACCOUNT_DELETION_GRACE_DAYS:30}
    conversation-retention-days: ${GDPR_CONVERSATION_RETENTION_DAYS:90}
    ip-retention-days: ${GDPR_IP_RETENTION_DAYS:90}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

# Swagger / OpenAPI is opt-in for local development only.
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
  encryption:
    key: ${ENCRYPTION_KEY}

logging:
  level:
    com.postwerk: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    com.postwerk: INFO
