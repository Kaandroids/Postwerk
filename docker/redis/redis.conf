bind 0.0.0.0
protected-mode yes
port 6379
# Auth password is injected at runtime via the compose `command`
# (redis-server ... --requirepass ${REDIS_PASSWORD}); no secret is committed here.

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru
