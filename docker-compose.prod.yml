# Production stack for the Postwerk VM.
# Differences vs docker-compose.yml (local):
#   - Caddy front door (auto-HTTPS) instead of nginx
#   - No host port bindings for postgres/redis/backend/frontend (internal only)
#   - .env is GENERATED on the VM by deploy/deploy.sh from Secret Manager
#
# Run via:  ./deploy/deploy.sh   (which generates .env then `up -d --build`)
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postwerk-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    container_name: postwerk-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - backend-net

  backend:
    image: europe-west3-docker.pkg.dev/postwerk/postwerk/backend:${IMAGE_TAG:-latest}
    container_name: postwerk-backend
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/v1/health"]
      interval: 15s
      timeout: 10s
      # Cold JVM + JPA/Hibernate boot on the small VM takes ~130s (worse during `up --build`
      # while Maven/Angular thrash swap). Keep the container in "starting" well past that so a
      # slow-but-healthy backend isn't killed and the dependent frontend isn't aborted.
      start_period: 240s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1500M
    networks:
      - backend-net

  frontend:
    image: europe-west3-docker.pkg.dev/postwerk/postwerk/frontend:${IMAGE_TAG:-latest}
    container_name: postwerk-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - backend-net

  caddy:
    image: caddy:2-alpine
    container_name: postwerk-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - backend-net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  backend-net:
    driver: bridge
